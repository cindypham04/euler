<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>unblind capture</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:#000;color:#fff;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;overflow:hidden}
    header{padding:12px 16px;font-size:14px;font-weight:600}
    #vid-wrap{flex:1;position:relative;overflow:hidden}
    #vid{width:100%;height:100%;object-fit:cover;background:#000}
    #status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 24px;font-size:14px;color:rgba(255,255,255,0.75)}
    #log{max-height:96px;overflow-y:auto;background:rgba(0,0,0,0.85);padding:4px 8px;font-family:ui-monospace,SFMono-Regular,monospace;font-size:10px;line-height:1.3;color:rgba(255,255,255,0.8)}
    #err{background:#3b0d0d;color:#fbb;padding:8px 16px;font-size:13px}
    #btn-wrap{display:flex;justify-content:center;padding:16px;padding-bottom:calc(env(safe-area-inset-bottom) + 16px)}
    #btn{min-height:56px;min-width:224px;border-radius:10px;border:none;background:#fff;color:#000;font-size:18px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
    #btn:active:not(:disabled){background:rgba(255,255,255,0.85)}
    #btn:disabled{opacity:0.5}
    [hidden]{display:none !important}
  </style>
</head>
<body>

<header>Capture problem</header>

<div id="vid-wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="snap" hidden></canvas>
  <div id="status">Starting camera…</div>
</div>

<div id="log"></div>
<div id="err" hidden></div>

<div id="btn-wrap">
  <button id="btn" disabled>Capture</button>
</div>

<script>
(function(){
  var vid = document.getElementById('vid');
  var snap = document.getElementById('snap');
  var btn = document.getElementById('btn');
  var statusEl = document.getElementById('status');
  var errEl = document.getElementById('err');
  var logEl = document.getElementById('log');

  function log(s){
    var line = document.createElement('div');
    line.textContent = new Date().toISOString().slice(14,23) + ' ' + s;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function showError(msg){
    errEl.textContent = msg;
    errEl.hidden = false;
    statusEl.style.display = 'none';
  }

  log('boot: secure=' + (window.isSecureContext) + ' ua=' + navigator.userAgent.slice(0,60));

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showError('Camera API not available. Open this page over an HTTPS URL.');
    return;
  }

  log('boot: calling getUserMedia');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(function(stream){
      log('boot: got stream');
      vid.srcObject = stream;
      vid.onloadedmetadata = function(){
        var p = vid.play();
        if (p && p.catch) p.catch(function(){});
        statusEl.style.display = 'none';
        btn.disabled = false;
        log('ready');
      };
    })
    .catch(function(e){
      log('ERROR ' + e.name + ': ' + e.message);
      var hint = '';
      if (e.name === 'NotAllowedError') {
        hint = ' — open Safari settings (the AA icon in the address bar) → Website Settings → Camera → Allow, then reload.';
      }
      showError(e.name + ': ' + e.message + hint);
    });

  btn.addEventListener('click', function(){
    if (!vid.videoWidth) { log('capture: video not ready'); return; }
    btn.disabled = true;
    btn.textContent = 'Uploading…';
    snap.width = vid.videoWidth;
    snap.height = vid.videoHeight;
    snap.getContext('2d').drawImage(vid, 0, 0);
    snap.toBlob(function(blob){
      if (!blob){ showError('Failed to encode frame'); btn.disabled = false; btn.textContent = 'Capture'; return; }
      var fd = new FormData();
      fd.append('image', blob, 'capture.jpg');
      log('upload: posting to /api/solve');
      fetch('/api/solve', { method: 'POST', body: fd })
        .then(function(r){ return r.json().then(function(j){ return { status: r.status, body: j }; }); })
        .then(function(res){
          var j = res.body || {};
          if (j.ok && j.id){
            log('upload: ok, redirecting to /problems/' + j.id);
            window.location.href = '/problems/' + j.id;
          } else {
            showError((j.error || 'Upload failed') + ' (status ' + res.status + ')');
            btn.disabled = false;
            btn.textContent = 'Capture';
          }
        })
        .catch(function(e){
          showError('Upload failed: ' + (e && e.message ? e.message : e));
          btn.disabled = false;
          btn.textContent = 'Capture';
        });
    }, 'image/jpeg', 0.92);
  });
})();
</script>

</body>
</html>
